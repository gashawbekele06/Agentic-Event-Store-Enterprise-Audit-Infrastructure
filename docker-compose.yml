version: "3.9"

services:
  db:
    image: postgres:16
    container_name: apex_ledger_db
    environment:
      POSTGRES_DB: apex_ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - apex_ledger_data:/var/lib/postgresql/data
      - ./src/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apex_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  apex_ledger_data: